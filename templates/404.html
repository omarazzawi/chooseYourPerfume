{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Choose Your Perfume</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/84c71096f4.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <div class="card shadow-lg p-5">
                    <h1 class="display-1" style="color: #3B544C;">404</h1>
                    <h2 class="mb-4" style="color: #020202;">Page Not Found</h2>
                    <p class="lead mb-4" style="color: #333;">
                        <i class="fa-solid fa-exclamation-triangle" style="color: #ffc107;"></i>
                        Sorry, the page you're looking for doesn't exist.
                    </p>
                    <p class="mb-4" style="color: #6c757d;">
                        The page may have been moved or deleted, or you may have mistyped the URL.
                    </p>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                        <a href="{% url 'home' %}" class="btn btn-lg" style="background-color: #198754; color: #F1F7ED;">
                            <i class="fa-solid fa-home"></i> Return to Homepage
                        </a>
                        <a href="{% url 'consultations:consultation_list' %}" class="btn btn-lg" style="background-color: #3B544C; color: #F1F7ED;">
                            <i class="fa-solid fa-calendar"></i> Book Consultation
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
